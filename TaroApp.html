<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Jyotish Tarot — Hindu Mythic Oracle</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Noto+Sans+Devanagari:wght@300;400&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   ROOT TOKENS
═══════════════════════════════════════════ */
:root {
  --gold:       #D4AF37;
  --gold-hi:    #FFD700;
  --gold-dim:   rgba(212,175,55,0.35);
  --saffron:    #E8630A;
  --saffron-lo: rgba(232,99,10,0.25);
  --maroon:     #4A0E0E;
  --bg:         #050305;
  --bg2:        #0C080C;
  --surface:    #110d10;
  --surface2:   #1a141a;
  --surface3:   #221a22;
  --cream:      #EDD9A3;
  --cream-dim:  rgba(237,217,163,0.55);
  --rust:       #7A3B1E;
  --text-lo:    rgba(237,217,163,0.3);
  --r: 14px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
body { font-family: 'Crimson Text', Georgia, serif; color: var(--cream); }

/* ═══════════════════════════════════════════
   APP SHELL — phone frame
═══════════════════════════════════════════ */
#app {
  width: 390px;
  height: 780px;
  margin: 0 auto;
  position: relative;
  overflow: hidden;
  background: var(--bg);
  border-radius: 28px;
  box-shadow:
    0 0 0 1px rgba(212,175,55,0.15),
    0 0 80px rgba(232,99,10,0.12),
    0 40px 100px rgba(0,0,0,0.8);
}

/* ═══════════════════════════════════════════
   SCREEN SYSTEM
═══════════════════════════════════════════ */
.screen {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  opacity: 0; pointer-events: none;
  transition: opacity 0.45s ease;
  overflow: hidden;
}
.screen.active { opacity: 1; pointer-events: all; }

/* ═══════════════════════════════════════════
   TOPBAR
═══════════════════════════════════════════ */
.topbar {
  height: 54px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 18px;
  background: linear-gradient(180deg, rgba(5,3,5,0.98) 0%, rgba(5,3,5,0.85) 100%);
  border-bottom: 1px solid rgba(212,175,55,0.12);
  position: relative; z-index: 5;
}
.topbar::after {
  content: '';
  position: absolute; bottom: 0; left: 10%; right: 10%;
  height: 1px;
  background: linear-gradient(to right, transparent, rgba(232,99,10,0.4), transparent);
}
.tb-icon { background: none; border: none; color: var(--gold); font-size: 20px; cursor: pointer; padding: 6px; opacity: 0.85; transition: opacity 0.2s; }
.tb-icon:hover { opacity: 1; }
.tb-title { font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 5px; color: var(--gold); }

/* ═══════════════════════════════════════════
   NAV BAR
═══════════════════════════════════════════ */
.navbar {
  height: 54px; flex-shrink: 0;
  display: flex;
  background: var(--bg2);
  border-top: 1px solid rgba(212,175,55,0.1);
}
.nav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; cursor: pointer; font-size: 9px; letter-spacing: 2px;
  color: var(--text-lo); font-family: 'Cinzel', serif;
  transition: color 0.25s;
  border: none; background: none;
}
.nav-item .ni { font-size: 18px; }
.nav-item.active, .nav-item:hover { color: var(--gold); }
.nav-item.active { position: relative; }
.nav-item.active::before {
  content: ''; position: absolute; top: 0; left: 20%; right: 20%;
  height: 2px; background: linear-gradient(to right, transparent, var(--saffron), transparent);
}

/* ═══════════════════════════════════════════
   ── SPLASH ──
═══════════════════════════════════════════ */
#splash {
  background: radial-gradient(ellipse at 50% 40%, #1a0a02 0%, #000 60%);
  align-items: center; justify-content: center;
}
.splash-particles { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
.spark {
  position: absolute; border-radius: 50%;
  background: var(--gold-hi); opacity: 0;
  animation: spark-rise var(--dur,4s) var(--delay,0s) ease-out infinite;
}
@keyframes spark-rise {
  0%   { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
  15%  { opacity: 0.7; }
  100% { transform: translateY(-280px) translateX(var(--dx,0px)) scale(0.2); opacity: 0; }
}
.om-stage { position: relative; width: 220px; height: 220px; display: flex; align-items: center; justify-content: center; }
.om-halo {
  position: absolute; border-radius: 50%; border: 1px solid rgba(232,99,10,0.2);
  animation: halo-breathe 3s ease-in-out infinite;
}
.om-halo:nth-child(1) { width:100px; height:100px; animation-delay:0s; }
.om-halo:nth-child(2) { width:145px; height:145px; animation-delay:0.6s; }
.om-halo:nth-child(3) { width:190px; height:190px; animation-delay:1.2s; border-color: rgba(212,175,55,0.1); }
.om-halo:nth-child(4) { width:220px; height:220px; animation-delay:1.8s; border-color: rgba(212,175,55,0.06); }
@keyframes halo-breathe {
  0%,100%{ opacity: 0.4; transform: scale(1); }
  50%    { opacity: 1;   transform: scale(1.03); }
}
.om-core {
  position: absolute; width: 110px; height: 110px; border-radius: 50%;
  background: radial-gradient(circle, rgba(232,99,10,0.5) 0%, rgba(212,175,55,0.2) 45%, transparent 70%);
  animation: core-pulse 2.5s ease-in-out infinite;
}
@keyframes core-pulse {
  0%,100%{ transform: scale(1); opacity: 0.8; }
  50%    { transform: scale(1.15); opacity: 1; }
}
.om-glyph {
  font-size: 96px; z-index: 2;
  color: var(--gold-hi);
  text-shadow: 0 0 30px rgba(255,215,0,0.7), 0 0 80px rgba(232,99,10,0.5);
  animation: om-levitate 4s ease-in-out infinite;
  user-select: none; line-height: 1;
}
@keyframes om-levitate {
  0%,100%{ transform: translateY(0) scale(1); }
  50%    { transform: translateY(-10px) scale(1.04); }
}
.splash-wordmark { margin-top: 36px; text-align: center; }
.splash-title { font-family: 'Cinzel', serif; font-size: 22px; letter-spacing: 8px; color: var(--gold); font-weight: 600; }
.splash-sub { font-size: 10px; letter-spacing: 6px; color: var(--saffron); margin-top: 5px; opacity: 0.9; font-family: 'Cinzel', serif; }
.splash-ornament { color: rgba(212,175,55,0.4); font-size: 16px; margin: 0 8px; }
.splash-cta {
  margin-top: 52px;
  background: transparent;
  border: 1px solid rgba(212,175,55,0.5);
  color: var(--gold);
  font-family: 'Cinzel', serif;
  font-size: 11px; letter-spacing: 5px;
  padding: 14px 44px;
  cursor: pointer;
  transition: all 0.35s;
  position: relative; overflow: hidden;
}
.splash-cta::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(232,99,10,0.15), rgba(212,175,55,0.1));
  opacity: 0; transition: opacity 0.3s;
}
.splash-cta:hover::before { opacity: 1; }
.splash-cta:hover { border-color: var(--gold); box-shadow: 0 0 30px rgba(212,175,55,0.2); letter-spacing: 6px; }

/* ═══════════════════════════════════════════
   ── DIVINATION SCREEN ──
═══════════════════════════════════════════ */
#divination { background: var(--bg); }

/* tray */
.tray-section {
  flex-shrink: 0;
  padding: 10px 14px 8px;
  position: relative;
}
.tray-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 8px;
}
.tray-label { font-family:'Cinzel',serif; font-size:8px; letter-spacing:4px; color:var(--text-lo); }
.tray-count { font-family:'Cinzel',serif; font-size:8px; color:var(--saffron); margin-left:auto; }

.snake-tray {
  display: flex; gap: 8px; padding: 8px 30px;
  border: 1px solid rgba(212,175,55,0.14);
  border-radius: 6px;
  position: relative;
  background: linear-gradient(135deg, rgba(17,13,16,0.9), rgba(26,20,26,0.9));
  min-height: 58px; align-items: center;
}
.snake-tray::before, .snake-tray::after {
  position: absolute; top: 50%; transform: translateY(-50%);
  font-size: 20px; color: rgba(212,175,55,0.35);
  animation: snake-sway 3s ease-in-out infinite;
}
.snake-tray::before { content:'𓆙'; left: 6px; }
.snake-tray::after  { content:'𓆙'; right: 6px; transform: translateY(-50%) scaleX(-1); }
@keyframes snake-sway {
  0%,100%{ opacity:0.3; transform:translateY(-50%) rotate(-3deg); }
  50%    { opacity:0.6; transform:translateY(-55%) rotate(3deg); }
}
.snake-tray::after { animation-name: snake-sway-r; }
@keyframes snake-sway-r {
  0%,100%{ opacity:0.3; transform:translateY(-50%) scaleX(-1) rotate(-3deg); }
  50%    { opacity:0.6; transform:translateY(-55%) scaleX(-1) rotate(3deg); }
}

.tray-slot {
  width: 40px; height: 58px; border-radius: 5px;
  border: 1px dashed rgba(212,175,55,0.2);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  font-size: 18px; color: var(--text-lo);
  transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
  flex-shrink: 0; position:relative; overflow:hidden;
}
.tray-slot.filled {
  border-color: rgba(212,175,55,0.55);
  background: var(--surface2);
  box-shadow: 0 0 14px rgba(232,99,10,0.2), inset 0 0 12px rgba(212,175,55,0.04);
}
.tray-slot.filled .slot-add { display:none; }
.tray-slot .slot-icon { font-size:16px; display:none; }
.tray-slot .slot-name { font-size:6.5px; font-family:'Cinzel',serif; color:var(--gold); text-align:center; padding:0 2px; display:none; line-height:1.3; }
.tray-slot .slot-deity{ font-size:6px; color:var(--saffron); display:none; }
.tray-slot.filled .slot-icon, .tray-slot.filled .slot-name, .tray-slot.filled .slot-deity { display:block; }
.tray-slot .slot-add { font-size:14px; }
.slot-glow-check {
  position:absolute; top:2px; right:3px;
  font-size:7px; color:var(--gold); display:none;
}
.tray-slot.filled .slot-glow-check { display:block; }

/* divider */
.ornament-divider {
  display:flex; align-items:center; gap:6px;
  padding: 4px 16px; flex-shrink:0;
}
.od-line { flex:1; height:1px; background:linear-gradient(to right, transparent, rgba(212,175,55,0.15), transparent); }
.od-sym { font-size:11px; color:rgba(212,175,55,0.35); letter-spacing:4px; }

/* deck area */
.deck-area { flex:1; display:flex; flex-direction:column; justify-content:center; position:relative; overflow:hidden; }
.deck-bg {
  position:absolute; inset:0;
  background: radial-gradient(ellipse at 50% 60%, rgba(74,14,14,0.12) 0%, transparent 65%);
  pointer-events:none;
}
.deck-hint {
  font-family:'Cinzel',serif; font-size:8px; letter-spacing:3px;
  color:var(--text-lo); text-align:center; padding:0 0 10px; flex-shrink:0;
}
.deck-scroll {
  display:flex; gap:12px;
  overflow-x:auto; overflow-y:visible;
  padding: 22px 30px 28px;
  scrollbar-width:none; -ms-overflow-style:none;
  cursor:grab; -webkit-overflow-scrolling:touch;
  align-items:flex-end;
}
.deck-scroll::-webkit-scrollbar { display:none; }
.deck-scroll.grabbing { cursor:grabbing; }

/* ── TAROT CARD ── */
.tc {
  flex-shrink:0;
  width: 108px; height: 172px;
  border-radius: 10px;
  border: 1px solid rgba(212,175,55,0.22);
  background: var(--surface);
  position: relative; cursor:pointer;
  transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s;
  transform-style: preserve-3d;
  perspective: 600px;
  user-select:none;
}
.tc:hover { transform: translateY(-10px) scale(1.03); border-color:rgba(212,175,55,0.5); box-shadow:0 18px 40px rgba(0,0,0,0.6), 0 0 20px rgba(232,99,10,0.15); }
.tc.selected { border-color:var(--gold); box-shadow:0 0 24px rgba(212,175,55,0.4), inset 0 0 20px rgba(212,175,55,0.04); }

/* card inner */
.card-back, .card-front {
  position:absolute; inset:0; border-radius:9px;
  backface-visibility:hidden; -webkit-backface-visibility:hidden;
  display:flex; flex-direction:column; align-items:center;
  overflow:hidden;
}
.card-front { transform: rotateY(180deg); }
.tc.flipped .card-back { transform: rotateY(180deg); }
.tc.flipped .card-front { transform: rotateY(0deg); }
.tc { transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s; }
.tc.flip-anim { transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s, transform 0.5s ease; }

/* card back */
.card-back {
  background: radial-gradient(ellipse at 50% 30%, #1a1018 0%, #0d080d 100%);
}
.cb-inner-border {
  position:absolute; inset:5px; border-radius:6px;
  border:1px solid rgba(212,175,55,0.1);
  pointer-events:none;
}
.cb-pattern {
  position:absolute; inset:0;
  background: repeating-linear-gradient(45deg, transparent, transparent 9px, rgba(212,175,55,0.015) 9px, rgba(212,175,55,0.015) 10px);
  border-radius:9px;
}
.cb-om {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  font-size:38px; color:rgba(212,175,55,0.12);
  pointer-events:none;
}
.cb-num {
  position:absolute; top:8px; left:50%; transform:translateX(-50%);
  font-family:'Cinzel',serif; font-size:7px; letter-spacing:2px;
  color:rgba(212,175,55,0.2);
}
.cb-suit {
  position:absolute; bottom:28px; left:50%; transform:translateX(-50%);
  font-family:'Cinzel',serif; font-size:7px; letter-spacing:2px;
  color:rgba(212,175,55,0.15);
}

/* card front */
.card-front {
  background: linear-gradient(160deg, #140e10 0%, #0e0a0d 100%);
  padding:8px 7px;
}
.cf-arcana { font-family:'Cinzel',serif; font-size:7px; letter-spacing:2px; color:var(--saffron); opacity:0.8; }
.cf-deity-icon { font-size:28px; margin:3px 0; }
.cf-name { font-family:'Cinzel',serif; font-size:8.5px; color:var(--gold); text-align:center; line-height:1.3; font-weight:600; }
.cf-san { font-family:'Noto Sans Devanagari',sans-serif; font-size:9px; color:rgba(232,99,10,0.8); margin-top:2px; }
.cf-deity { font-size:8px; color:var(--cream-dim); margin-top:1px; font-style:italic; }
.cf-hr { width:28px; height:1px; background:rgba(212,175,55,0.3); margin:5px auto; }
.cf-kw { font-size:8px; color:rgba(237,217,163,0.55); text-align:center; line-height:1.5; }

/* corner tap zone */
.corner-tap {
  position:absolute; bottom:0; right:0;
  width:38px; height:38px;
  cursor:pointer;
  display:flex; align-items:flex-end; justify-content:flex-end;
  padding:7px;
  z-index:10;
}
.corner-dot {
  width:9px; height:9px; border-radius:50%;
  background:var(--saffron);
  box-shadow:0 0 8px var(--saffron);
  opacity:0.45;
  transition:all 0.25s;
}
.tc:hover .corner-dot, .corner-tap:hover .corner-dot {
  opacity:1; transform:scale(1.5);
  box-shadow:0 0 14px var(--saffron), 0 0 30px rgba(232,99,10,0.4);
}
.tc.selected .corner-dot { opacity:1; background:var(--gold); box-shadow:0 0 12px var(--gold); }
.selected-check {
  position:absolute; top:5px; right:6px;
  font-size:9px; color:var(--gold);
  display:none; z-index:10;
}
.tc.selected .selected-check { display:block; }

/* bottom actions */
.action-bar { flex-shrink:0; padding:8px 14px 10px; display:flex; gap:10px; background:rgba(5,3,5,0.95); border-top:1px solid rgba(212,175,55,0.08); }
.act-btn {
  flex:1; padding:10px; border:1px solid rgba(212,175,55,0.3);
  background:transparent; color:var(--gold);
  font-family:'Cinzel',serif; font-size:10px; letter-spacing:3px;
  cursor:pointer; border-radius:4px; transition:all 0.25s;
}
.act-btn:hover { background:rgba(212,175,55,0.07); border-color:var(--gold); }
.act-btn.primary {
  background:linear-gradient(135deg, rgba(232,99,10,0.25), rgba(212,175,55,0.15));
  border-color:var(--gold);
  box-shadow:0 0 20px rgba(232,99,10,0.15);
}
.act-btn.primary:hover { box-shadow:0 0 30px rgba(232,99,10,0.3); }

/* toast */
.toast {
  position:absolute; bottom:72px; left:50%; transform:translateX(-50%);
  background:rgba(212,175,55,0.1); border:1px solid rgba(212,175,55,0.35);
  border-radius:20px; padding:7px 18px;
  font-family:'Cinzel',serif; font-size:10px; letter-spacing:2px; color:var(--gold);
  white-space:nowrap; opacity:0; transition:opacity 0.3s; pointer-events:none;
  z-index:20;
}
.toast.show { opacity:1; }

/* ═══════════════════════════════════════════
   ── READING SCREEN ──
═══════════════════════════════════════════ */
#reading { background: var(--bg); }
.reading-body { flex:1; overflow-y:auto; padding:0 14px 14px; }
.reading-body::-webkit-scrollbar { width:3px; }
.reading-body::-webkit-scrollbar-thumb { background:rgba(212,175,55,0.2); border-radius:4px; }

.spread-layout { display:flex; gap:10px; justify-content:center; padding:14px 0 10px; flex-wrap:wrap; }
.spread-card-wrap { display:flex; flex-direction:column; align-items:center; gap:5px; cursor:pointer; }
.spread-pos-label { font-family:'Cinzel',serif; font-size:7px; letter-spacing:2px; color:var(--text-lo); text-align:center; }
.spread-mini {
  width:72px; height:115px; border-radius:7px;
  border:1px solid rgba(212,175,55,0.3);
  background:var(--surface2);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:2px; padding:5px;
  box-shadow:0 0 16px rgba(232,99,10,0.1);
  transition:all 0.25s; position:relative; overflow:hidden;
}
.spread-mini:hover { transform:translateY(-4px); box-shadow:0 8px 24px rgba(0,0,0,0.5), 0 0 20px rgba(232,99,10,0.2); }
.spread-mini.reversed { transform:rotate(180deg); }
.spread-mini.reversed:hover { transform:rotate(180deg) translateY(4px); }
.sm-icon { font-size:20px; }
.sm-name { font-family:'Cinzel',serif; font-size:6.5px; color:var(--gold); text-align:center; line-height:1.3; }
.sm-deity { font-size:6.5px; color:var(--saffron); }
.sm-pos { position:absolute; top:3px; right:4px; font-size:7px; color:var(--text-lo); font-family:'Cinzel',serif; }

.card-detail-block {
  background:var(--surface);
  border:1px solid rgba(212,175,55,0.12);
  border-radius:var(--r); padding:14px;
  margin-bottom:12px;
}
.cdb-header { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.cdb-icon { font-size:32px; }
.cdb-info { flex:1; }
.cdb-name { font-family:'Cinzel',serif; font-size:14px; color:var(--gold); line-height:1.2; }
.cdb-san { font-family:'Noto Sans Devanagari',sans-serif; font-size:11px; color:var(--saffron); margin-top:2px; }
.cdb-tag { font-size:10px; color:var(--cream-dim); }
.cdb-reversed { display:inline-block; background:rgba(122,59,30,0.3); border:1px solid rgba(122,59,30,0.5); border-radius:10px; padding:2px 8px; font-size:9px; color:#E87060; font-family:'Cinzel',serif; letter-spacing:1px; margin-top:4px; }
.detail-row { margin-bottom:9px; }
.dr-label { font-family:'Cinzel',serif; font-size:8px; letter-spacing:3px; color:var(--saffron); margin-bottom:4px; }
.dr-body { font-size:13px; color:var(--cream); line-height:1.65; opacity:0.85; }
.dr-mantra { font-size:15px; color:var(--gold); font-style:italic; }
.kw-pills { display:flex; flex-wrap:wrap; gap:5px; margin-top:4px; }
.kw-pill {
  background:rgba(232,99,10,0.1); border:1px solid rgba(232,99,10,0.3);
  color:var(--saffron); border-radius:10px; padding:2px 10px; font-size:10px;
  font-family:'Cinzel',serif; letter-spacing:1px;
}
.deity-block {
  background:linear-gradient(135deg, rgba(74,14,14,0.3), rgba(26,20,26,0.8));
  border:1px solid rgba(232,99,10,0.2); border-radius:10px; padding:10px 12px;
  margin-top:6px;
}
.deity-type { font-family:'Cinzel',serif; font-size:8px; letter-spacing:3px; color:rgba(232,99,10,0.7); margin-bottom:3px; }
.deity-name { font-family:'Cinzel',serif; font-size:13px; color:var(--gold); }
.deity-role { font-size:10px; color:var(--saffron); opacity:0.8; margin-top:1px; font-family:'Cinzel',serif; letter-spacing:1px; }
.deity-desc { font-size:12px; color:var(--cream-dim); margin-top:6px; line-height:1.6; }

/* ═══════════════════════════════════════════
   ── CATALOGUE SCREEN ──
═══════════════════════════════════════════ */
#catalogue { background: var(--bg); }

/* ═══════════════════════════════════════════
   BUILD DECK
═══════════════════════════════════════════ */
function buildDeck() {
  const scroll = document.getElementById('deckScroll');
  scroll.innerHTML = '';
  deck.forEach((c,i) => {
    const el = document.createElement('div');
    el.className = 'tc';
    el.dataset.idx = i;
    el.innerHTML = `
      <div class="card-back">
        <div class="cb-pattern"></div>
        <div class="cb-om">ॐ</div>
        <div class="cb-inner-border"></div>
        <div class="cb-num">${c.num}</div>
        <div class="cb-suit">${c.suit}</div>
      </div>
      <div class="card-front">
        <div class="cf-arcana">${c.suit}</div>
        <div class="cf-deity-icon">${c.icon}</div>
        <div class="cf-name">${c.name}</div>
        <div class="cf-san">${c.san}</div>
        <div class="cf-deity">${c.deity}</div>
        <div class="cf-hr"></div>
        <div class="cf-kw">${c.upright.split(',')[0].trim()}</div>
      </div>
      <div class="corner-tap" data-ci="${i}">
        <div class="corner-dot"></div>
      </div>
      <div class="selected-check">✓</div>`;

    /* flip on body click */
    el.addEventListener('click', e => {
      if (e.target.closest('.corner-tap')) return;
      el.classList.add('flip-anim');
      el.classList.toggle('flipped');
    });

    /* select on corner tap */
    el.querySelector('.corner-tap').addEventListener('click', e => {
      e.stopPropagation();
      toggleSelect(i, el, c);
    });

    scroll.appendChild(el);
  });

  /* drag-scroll */
  const s = scroll;
  let down=false, sx, sl;
  s.addEventListener('mousedown', e=>{ down=true; s.classList.add('grabbing'); sx=e.pageX-s.offsetLeft; sl=s.scrollLeft; });
  s.addEventListener('mouseleave',()=>{ down=false; s.classList.remove('grabbing'); });
  s.addEventListener('mouseup',()=>{ down=false; s.classList.remove('grabbing'); });
  s.addEventListener('mousemove',e=>{ if(!down)return; e.preventDefault(); s.scrollLeft=sl-(e.pageX-s.offsetLeft-sx); });
}

/* ═══════════════════════════════════════════
   SELECTION
═══════════════════════════════════════════ */
function toggleSelect(i, el, card) {
  if(el.classList.contains('selected')) {
    el.classList.remove('selected');
    selected = selected.filter(x=>x.id!==card.id);
  } else {
    if(selected.length>=3){ showToast('Max 3 cards · tap to deselect'); return; }
    el.classList.add('selected','flipped');
    selected.push(card);
  }
  updateTray();
  if(selected.length>0) showToast('✦ '+card.name+' · '+card.deity);
}

function updateTray() {
  document.getElementById('selCount').textContent = selected.length+' / 3';
  for(let s=0;s<3;s++){
    const slot=document.getElementById('slot'+s);
    const c=selected[s];
    if(c){
      slot.classList.add('filled');
      slot.querySelector('.slot-icon').textContent=c.icon;
      slot.querySelector('.slot-name').textContent=c.name.split(' ').slice(-1)[0];
      slot.querySelector('.slot-deity').textContent=c.deity.split(' ')[0];
    } else {
      slot.classList.remove('filled');
      slot.querySelector('.slot-icon').textContent='';
      slot.querySelector('.slot-name').textContent='';
      slot.querySelector('.slot-deity').textContent='';
    }
  }
}

/* ═══════════════════════════════════════════
   SHUFFLE
═══════════════════════════════════════════ */
function shuffleDeck() {
  const scroll=document.getElementById('deckScroll');
  scroll.style.transition='opacity 0.3s';
  scroll.style.opacity='0';
  selected=[];
  updateTray();
  setTimeout(()=>{
    for(let i=deck.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [deck[i],deck[j]]=[deck[j],deck[i]];
    }
    buildDeck();
    scroll.style.opacity='1';
    showToast('✦ Deck shuffled · Choose your cards');
  },320);
}

═══════════════════════════════════════════ */
const SPREAD_LABELS = [
  ['PAST','PRESENT','FUTURE'],
  ['MIND','HEART','PATH'],
  ['SITUATION','ACTION','OUTCOME']
];

function doReading() {
  if(!selected.length){ showToast('Select at least 1 card'); return; }
  const labels=SPREAD_LABELS[Math.floor(Math.random()*SPREAD_LABELS.length)];
  const isReversed = () => Math.random()<0.3;
  let html='';

  /* spread layout */
  html+=`<div class="spread-layout">`;
  selected.forEach((c,i)=>{
    const rev=isReversed();
    html+=`<div class="spread-card-wrap" onclick="openDetail('${c.id}','reading')">
      <div class="spread-mini${rev?' reversed':''}">
        <span class="sm-pos">${i+1}</span>
        <span class="sm-icon">${c.icon}</span>
        <span class="sm-name">${c.name}</span>
        <span class="sm-deity">${c.deity.split(' ')[0]}</span>
      </div>
      <div class="spread-pos-label">${labels[i]||'CARD '+(i+1)}</div>
    </div>`;
  });
  html+=`</div>`;

  /* per-card detail blocks */
  selected.forEach((c,i)=>{
    const rev=isReversed();
    html+=`
    <div class="card-detail-block" onclick="openDetail('${c.id}','reading')" style="cursor:pointer;">
      <div class="cdb-header">
        <div class="cdb-icon">${c.icon}</div>
        <div class="cdb-info">
          <div class="cdb-name">${c.name}</div>
          <div class="cdb-san">${c.san}</div>
          <div class="cdb-tag">${c.suit} · ${c.deity}</div>
          ${rev?'<div class="cdb-reversed">⬇ REVERSED</div>':''}
        </div>
      </div>
      <div class="detail-row">
        <div class="dr-label">${labels[i]||'POSITION '+(i+1)} — ${rev?'REVERSED MEANING':'UPRIGHT MEANING'}</div>
        <div class="dr-body">${rev?c.reversed:c.upright}</div>
      </div>
      <div class="detail-row">
        <div class="dr-label">CORE MANTRA</div>
        <div class="dr-mantra">"${c.mantra}"</div>
      </div>
    </div>`;
  });

  const readBody=document.getElementById('readingBody');
  readBody.innerHTML=html;
  document.getElementById('readingTitle').textContent=
    selected.length===1?'YOUR CARD':selected.length+'-CARD READING';
  prevScreen='divination';
  showScreen('reading');
}

      <div class="ds-label">CORE MANTRA</div>
      <div class="mantra-wrap">
        <div class="ds-mantra">"${c.mantra}"</div>
      </div>
    </div>
    <div class="detail-section">
      <div class="ds-label">NOTES & SYMBOLISM</div>
      <div class="ds-body">${c.notes}</div>
    </div>`;

  showScreen('cardDetail');
}

/* ═══════════════════════════════════════════
   CATALOGUE
═══════════════════════════════════════════ */
function renderCatalogue(query='') {
  const q=query.toLowerCase();
  const list=document.getElementById('catList');
  const filtered=CARDS.filter(c=>{
    const matchFilter=catFilter==='ALL'||c.suit===catFilter;
    const matchSearch=!q||
      c.name.toLowerCase().includes(q)||
      c.deity.toLowerCase().includes(q)||
      c.upright.toLowerCase().includes(q)||
      c.san.includes(q)||
      c.type.toLowerCase().includes(q);
    return matchFilter&&matchSearch;
  });
  list.innerHTML=filtered.length?
    filtered.map(c=>`
    <div class="cat-row" onclick="openDetail('${c.id}','catalogue')">
      <div class="cat-mini">${c.icon}</div>
      <div class="cat-info">
        <div class="cat-name">${c.name}</div>
        <div class="cat-deity">${c.deity} · ${c.type}</div>
        <div class="cat-kw">${c.upright.split(',')[0]}</div>
      </div>
      <div class="cat-badge">${c.suit.substring(0,3)}</div>
    </div>`).join(''):
    `<div style="text-align:center;padding:40px;color:var(--text-lo);font-family:'Cinzel',serif;font-size:11px;letter-spacing:3px;">NO CARDS FOUND</div>`;
}

function filterCatalogue(q) { renderCatalogue(q); }

function setCatFilter(f, btn) {
  catFilter=f;
  document.querySelectorAll('.filter-pill').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  renderCatalogue(document.getElementById('searchInput')?.value||'');
}

/* ═══════════════════════════════════════════
   DRAWER
═══════════════════════════════════════════ */
function openDrawer() {
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawerOverlay').classList.add('open');
}
function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawerOverlay').classList.remove('open');
}

/* ═══════════════════════════════════════════
   TOAST
═══════════════════════════════════════════ */
let toastTimer;
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2000);
}

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
buildDeck();
renderCatalogue();
</script>
